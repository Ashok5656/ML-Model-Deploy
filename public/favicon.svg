<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <g fill="#29ABE2">

    <!-- ARM 0° -->
    <g transform="rotate(0,50,50)">
      <!-- shaft -->
      <rect x="46" y="21" width="8" height="29"/>
      <!-- shaft white dashes -->
      <rect x="44" y="28" width="12" height="2.5" fill="white"/>
      <rect x="44" y="37" width="12" height="2.5" fill="white"/>
      <!-- left fork prong (pivot = top-left of shaft, rotate -32°) -->
      <rect x="-8" y="-21" width="8" height="21" transform="translate(46,21) rotate(-32)"/>
      <rect x="-9" y="-14" width="9" height="2.2" fill="white" transform="translate(46,21) rotate(-32)"/>
      <!-- right fork prong -->
      <rect x="0" y="-21" width="8" height="21" transform="translate(54,21) rotate(32)"/>
      <rect x="0" y="-14" width="9" height="2.2" fill="white" transform="translate(54,21) rotate(32)"/>
      <!-- left mid-arm branch -->
      <rect x="-7" y="-14" width="7" height="14" transform="translate(46,33) rotate(-45)"/>
      <rect x="-8" y="-9"  width="8" height="2"   fill="white" transform="translate(46,33) rotate(-45)"/>
      <!-- right mid-arm branch -->
      <rect x="0" y="-14" width="7" height="14" transform="translate(54,33) rotate(45)"/>
      <rect x="0" y="-9"  width="8" height="2"   fill="white" transform="translate(54,33) rotate(45)"/>
    </g>

    <!-- ARM 60° -->
    <g transform="rotate(60,50,50)">
      <rect x="46" y="21" width="8" height="29"/>
      <rect x="44" y="28" width="12" height="2.5" fill="white"/>
      <rect x="44" y="37" width="12" height="2.5" fill="white"/>
      <rect x="-8" y="-21" width="8" height="21" transform="translate(46,21) rotate(-32)"/>
      <rect x="-9" y="-14" width="9" height="2.2" fill="white" transform="translate(46,21) rotate(-32)"/>
      <rect x="0" y="-21" width="8" height="21" transform="translate(54,21) rotate(32)"/>
      <rect x="0" y="-14" width="9" height="2.2" fill="white" transform="translate(54,21) rotate(32)"/>
      <rect x="-7" y="-14" width="7" height="14" transform="translate(46,33) rotate(-45)"/>
      <rect x="-8" y="-9"  width="8" height="2"   fill="white" transform="translate(46,33) rotate(-45)"/>
      <rect x="0" y="-14" width="7" height="14" transform="translate(54,33) rotate(45)"/>
      <rect x="0" y="-9"  width="8" height="2"   fill="white" transform="translate(54,33) rotate(45)"/>
    </g>

    <!-- ARM 120° -->
    <g transform="rotate(120,50,50)">
      <rect x="46" y="21" width="8" height="29"/>
      <rect x="44" y="28" width="12" height="2.5" fill="white"/>
      <rect x="44" y="37" width="12" height="2.5" fill="white"/>
      <rect x="-8" y="-21" width="8" height="21" transform="translate(46,21) rotate(-32)"/>
      <rect x="-9" y="-14" width="9" height="2.2" fill="white" transform="translate(46,21) rotate(-32)"/>
      <rect x="0" y="-21" width="8" height="21" transform="translate(54,21) rotate(32)"/>
      <rect x="0" y="-14" width="9" height="2.2" fill="white" transform="translate(54,21) rotate(32)"/>
      <rect x="-7" y="-14" width="7" height="14" transform="translate(46,33) rotate(-45)"/>
      <rect x="-8" y="-9"  width="8" height="2"   fill="white" transform="translate(46,33) rotate(-45)"/>
      <rect x="0" y="-14" width="7" height="14" transform="translate(54,33) rotate(45)"/>
      <rect x="0" y="-9"  width="8" height="2"   fill="white" transform="translate(54,33) rotate(45)"/>
    </g>

    <!-- ARM 180° -->
    <g transform="rotate(180,50,50)">
      <rect x="46" y="21" width="8" height="29"/>
      <rect x="44" y="28" width="12" height="2.5" fill="white"/>
      <rect x="44" y="37" width="12" height="2.5" fill="white"/>
      <rect x="-8" y="-21" width="8" height="21" transform="translate(46,21) rotate(-32)"/>
      <rect x="-9" y="-14" width="9" height="2.2" fill="white" transform="translate(46,21) rotate(-32)"/>
      <rect x="0" y="-21" width="8" height="21" transform="translate(54,21) rotate(32)"/>
      <rect x="0" y="-14" width="9" height="2.2" fill="white" transform="translate(54,21) rotate(32)"/>
      <rect x="-7" y="-14" width="7" height="14" transform="translate(46,33) rotate(-45)"/>
      <rect x="-8" y="-9"  width="8" height="2"   fill="white" transform="translate(46,33) rotate(-45)"/>
      <rect x="0" y="-14" width="7" height="14" transform="translate(54,33) rotate(45)"/>
      <rect x="0" y="-9"  width="8" height="2"   fill="white" transform="translate(54,33) rotate(45)"/>
    </g>

    <!-- ARM 240° -->
    <g transform="rotate(240,50,50)">
      <rect x="46" y="21" width="8" height="29"/>
      <rect x="44" y="28" width="12" height="2.5" fill="white"/>
      <rect x="44" y="37" width="12" height="2.5" fill="white"/>
      <rect x="-8" y="-21" width="8" height="21" transform="translate(46,21) rotate(-32)"/>
      <rect x="-9" y="-14" width="9" height="2.2" fill="white" transform="translate(46,21) rotate(-32)"/>
      <rect x="0" y="-21" width="8" height="21" transform="translate(54,21) rotate(32)"/>
      <rect x="0" y="-14" width="9" height="2.2" fill="white" transform="translate(54,21) rotate(32)"/>
      <rect x="-7" y="-14" width="7" height="14" transform="translate(46,33) rotate(-45)"/>
      <rect x="-8" y="-9"  width="8" height="2"   fill="white" transform="translate(46,33) rotate(-45)"/>
      <rect x="0" y="-14" width="7" height="14" transform="translate(54,33) rotate(45)"/>
      <rect x="0" y="-9"  width="8" height="2"   fill="white" transform="translate(54,33) rotate(45)"/>
    </g>

    <!-- ARM 300° -->
    <g transform="rotate(300,50,50)">
      <rect x="46" y="21" width="8" height="29"/>
      <rect x="44" y="28" width="12" height="2.5" fill="white"/>
      <rect x="44" y="37" width="12" height="2.5" fill="white"/>
      <rect x="-8" y="-21" width="8" height="21" transform="translate(46,21) rotate(-32)"/>
      <rect x="-9" y="-14" width="9" height="2.2" fill="white" transform="translate(46,21) rotate(-32)"/>
      <rect x="0" y="-21" width="8" height="21" transform="translate(54,21) rotate(32)"/>
      <rect x="0" y="-14" width="9" height="2.2" fill="white" transform="translate(54,21) rotate(32)"/>
      <rect x="-7" y="-14" width="7" height="14" transform="translate(46,33) rotate(-45)"/>
      <rect x="-8" y="-9"  width="8" height="2"   fill="white" transform="translate(46,33) rotate(-45)"/>
      <rect x="0" y="-14" width="7" height="14" transform="translate(54,33) rotate(45)"/>
      <rect x="0" y="-9"  width="8" height="2"   fill="white" transform="translate(54,33) rotate(45)"/>
    </g>

    <!-- centre hole -->
    <circle cx="50" cy="50" r="5.5" fill="white"/>
  </g>
</svg>
